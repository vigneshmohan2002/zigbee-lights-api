<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Lights</title>
  <link rel="manifest" href="/static/manifest.json">
  <meta name="theme-color" content="#111114">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #111114;
      --card:     #1e1e22;
      --card2:    #28282d;
      --card3:    #323238;
      --border:   rgba(255,255,255,0.07);
      --text:     #f2f2f7;
      --dim:      #8e8e93;
      --dim2:     #48484a;
      --gold:     #f5a623;
      --gold-bg:  rgba(245,166,35,0.12);
      --green:    #30d158;
      --red:      #ff453a;
      --radius:   18px;
      --radius-s: 12px;
      --safe-t: env(safe-area-inset-top,    0px);
      --safe-b: env(safe-area-inset-bottom, 0px);
      --safe-l: env(safe-area-inset-left,   0px);
      --safe-r: env(safe-area-inset-right,  0px);
    }
    html { background: var(--bg); }
    body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
      padding: calc(var(--safe-t) + 4px) var(--safe-r) calc(var(--safe-b) + 32px) var(--safe-l);
      overflow-x: hidden;
    }

    /* ── Header ── */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px 20px;
    }
    header h1 { font-size: 30px; font-weight: 700; letter-spacing: -0.6px; }
    #dot { width: 8px; height: 8px; border-radius: 50%; background: var(--dim2); transition: background .4s; }
    #dot.ok  { background: var(--green); box-shadow: 0 0 6px var(--green); }
    #dot.err { background: var(--red); }

    /* ── Section ── */
    .sec { padding: 0 16px 20px; }
    .sec-head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }
    .sec-label {
      font-size: 11px; font-weight: 700; letter-spacing: .08em;
      text-transform: uppercase; color: var(--dim);
    }
    .add-btn {
      background: var(--card2); border: 1px solid var(--border);
      color: var(--gold); border-radius: 8px; padding: 4px 12px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      transition: background .15s;
    }
    .add-btn:active { background: var(--card3); }

    /* ── Groups ── */
    .groups-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .group-card {
      background: var(--card); border-radius: var(--radius);
      padding: 16px; border: 1px solid var(--border);
    }
    .group-name { font-weight: 600; font-size: 14px; margin-bottom: 12px; text-transform: capitalize; }
    .group-btns { display: flex; gap: 6px; }
    .btn-on, .btn-off {
      flex: 1; border: none; border-radius: 10px; font-size: 14px;
      font-weight: 600; cursor: pointer; padding: 10px 0; min-height: 40px;
      transition: opacity .15s, transform .1s;
    }
    .btn-on:active, .btn-off:active { opacity: .65; transform: scale(.96); }
    .btn-on  { background: var(--gold); color: #000; }
    .btn-off { background: var(--card2); color: var(--dim); }

    /* ── Pill row ── */
    .pill-row {
      display: flex; gap: 8px; overflow-x: auto; padding-bottom: 2px;
      scrollbar-width: none; -webkit-overflow-scrolling: touch;
    }
    .pill-row::-webkit-scrollbar { display: none; }

    .pill {
      flex-shrink: 0; padding: 9px 18px; border-radius: 999px;
      border: 1px solid var(--border); background: var(--card);
      color: var(--text); font-size: 14px; font-weight: 500;
      cursor: pointer; white-space: nowrap; min-height: 38px;
      transition: background .15s, border-color .15s, transform .1s;
    }
    .pill:active { transform: scale(.95); }
    .pill.sel  { background: var(--gold); color: #000; border-color: var(--gold); }
    .pill.sel2 { background: #6e3aed; color: #fff; border-color: #6e3aed; }

    /* ── Colors ── */
    .colors-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; }
    .color-swatch {
      aspect-ratio: 1; max-height: 90px; border-radius: 14px; border: 2px solid transparent;
      cursor: pointer; transition: transform .15s, border-color .15s;
      position: relative; overflow: hidden;
    }
    .color-swatch:active { transform: scale(.92); }
    .color-swatch.sel { border-color: #fff; }
    .color-label {
      position: absolute; bottom: 5px; left: 0; right: 0;
      text-align: center; font-size: 10px; font-weight: 600;
      color: rgba(255,255,255,.85); text-shadow: 0 1px 3px rgba(0,0,0,.6);
      text-transform: capitalize;
    }

    /* ── Lights ── */
    .lights-list { display: flex; flex-direction: column; gap: 2px; }
    .light-card {
      background: var(--card); border-radius: var(--radius);
      border: 1px solid var(--border); overflow: hidden;
      transition: border-color .3s;
    }
    .light-card.on { border-color: rgba(245,166,35,.3); }
    .light-row { display: flex; align-items: center; padding: 14px 16px; gap: 12px; }
    .light-dot {
      width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
      background: var(--dim2); transition: background .3s, box-shadow .3s;
    }
    .light-card.on .light-dot {
      background: var(--gold);
      box-shadow: 0 0 8px rgba(245,166,35,.7);
    }
    .light-info { flex: 1; min-width: 0; }
    .light-name { font-weight: 600; font-size: 15px; text-transform: capitalize; }
    .light-sub  { font-size: 12px; color: var(--dim); margin-top: 2px; }
    .toggle {
      width: 51px; height: 31px; border-radius: 999px; border: none;
      background: var(--dim2); cursor: pointer; position: relative; flex-shrink: 0;
      transition: background .25s;
    }
    .toggle::after {
      content: ''; position: absolute; top: 2px; left: 2px;
      width: 27px; height: 27px; border-radius: 50%; background: #fff;
      box-shadow: 0 2px 6px rgba(0,0,0,.4);
      transition: transform .25s cubic-bezier(.4,0,.2,1);
    }
    .light-card.on .toggle { background: var(--gold); }
    .light-card.on .toggle::after { transform: translateX(20px); }
    .br-row { padding: 0 16px 14px; }
    input[type=range] {
      -webkit-appearance: none; width: 100%; height: 4px; border-radius: 2px;
      background: var(--card3); outline: none; cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 22px; height: 22px; border-radius: 50%;
      background: var(--gold); cursor: pointer; box-shadow: 0 2px 6px rgba(0,0,0,.3);
    }

    /* ── Add forms ── */
    .add-form {
      display: none; flex-direction: column; gap: 10px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px; margin-bottom: 12px;
    }
    .add-form.open { display: flex; }
    .form-row { display: flex; gap: 8px; align-items: center; }
    .field {
      flex: 1; background: var(--card2); border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 12px; color: var(--text);
      font-size: 14px; outline: none; min-height: 42px;
    }
    .field:focus { border-color: var(--gold); }
    .field-label { font-size: 12px; color: var(--dim); min-width: 70px; }
    .form-actions { display: flex; gap: 8px; margin-top: 2px; }
    .f-btn {
      flex: 1; border: none; border-radius: 10px; font-size: 14px;
      font-weight: 600; cursor: pointer; padding: 10px 0; min-height: 40px;
      transition: opacity .15s;
    }
    .f-btn:active { opacity: .7; }
    .f-btn.primary { background: var(--gold); color: #000; }
    .f-btn.secondary { background: var(--card2); color: var(--dim); }
    .f-btn.capture { background: var(--card3); color: var(--text); font-size: 13px; }

    /* ── Item with delete ── */
    .item-wrap { display: inline-flex; align-items: center; gap: 3px; flex-shrink: 0; }
    .del-btn {
      background: none; border: 1px solid var(--border); color: var(--dim);
      border-radius: 50%; width: 22px; height: 22px; cursor: pointer;
      font-size: 14px; line-height: 1; flex-shrink: 0;
      transition: color .15s, border-color .15s;
    }
    .del-btn:active { color: var(--red); border-color: var(--red); }

    /* ── Star ── */
    .star { background: none; border: none; cursor: pointer; font-size: 15px;
      padding: 2px; color: var(--dim2); flex-shrink: 0; line-height: 1; }
    .star.on { color: var(--gold); }

    .more-btn {
      background: none; border: none; color: var(--dim);
      font-size: 12px; font-weight: 500; cursor: pointer;
      padding: 6px 0 0; letter-spacing: .02em;
    }

    /* ── Divider ── */
    .sep { height: 1px; background: var(--border); margin: 0 16px 20px; }
  </style>
</head>
<body>

<header>
  <h1>Lights</h1>
  <div id="dot"></div>
</header>

<!-- Master brightness -->
<div class="sec" style="padding-bottom:12px">
  <div style="display:flex;align-items:center;gap:14px">
    <span style="font-size:18px;line-height:1">☀</span>
    <input type="range" min="1" max="254" value="127" id="master-bri"
      style="flex:1"
      oninput="setMasterBri(this.value)"
      onpointerdown="_masterTouched=Date.now()"
      ontouchstart="_masterTouched=Date.now()">
    <span id="master-bri-pct" style="font-size:13px;color:var(--dim);min-width:32px;text-align:right">50%</span>
  </div>
</div>

<!-- Groups -->
<div class="sec">
  <div class="sec-label" style="margin-bottom:12px">Rooms</div>
  <div class="groups-grid" id="groups"></div>
</div>

<div class="sep"></div>

<!-- Profiles -->
<div class="sec">
  <div class="sec-head">
    <div class="sec-label">Profiles</div>
    <button class="add-btn" onclick="toggleForm('profile-form')">+ Add</button>
  </div>
  <div class="add-form" id="profile-form">
    <input class="field" id="pf-name" placeholder="Name (e.g. Study)">
    <div class="form-row">
      <span class="field-label">Brightness</span>
      <input class="field" id="pf-bri" type="number" min="0" max="254" placeholder="0–254">
    </div>
    <div class="form-row">
      <span class="field-label">Colour temp</span>
      <input class="field" id="pf-ct" type="number" min="150" max="500" placeholder="250 cool → 454 warm">
    </div>
    <div class="form-actions">
      <button class="f-btn capture" onclick="captureProfile()">Capture current</button>
      <button class="f-btn secondary" onclick="toggleForm('profile-form')">Cancel</button>
      <button class="f-btn primary" onclick="saveProfile()">Save</button>
    </div>
  </div>
  <div class="pill-row" id="profiles"></div>
</div>

<div class="sep"></div>

<!-- Scenes -->
<div class="sec">
  <div class="sec-head">
    <div class="sec-label">Scenes</div>
    <button class="add-btn" onclick="toggleForm('scene-form')">+ Add</button>
  </div>
  <div class="add-form" id="scene-form">
    <input class="field" id="sc-name" placeholder="Name (e.g. Gaming)">
    <div class="form-row">
      <span class="field-label">Brightness</span>
      <input class="field" id="sc-bri" type="number" min="0" max="254" placeholder="0–254">
    </div>
    <div class="form-row">
      <span class="field-label">Colour temp</span>
      <input class="field" id="sc-ct" type="number" min="150" max="500" placeholder="mireds (optional)">
    </div>
    <div class="form-row">
      <span class="field-label">Hue</span>
      <input class="field" id="sc-hue" type="number" min="0" max="360" placeholder="0–360 (optional)">
      <span class="field-label" style="min-width:50px">Sat</span>
      <input class="field" id="sc-sat" type="number" min="0" max="100" placeholder="0–100">
    </div>
    <div class="form-actions">
      <button class="f-btn capture" onclick="captureScene()">Capture current</button>
      <button class="f-btn secondary" onclick="toggleForm('scene-form')">Cancel</button>
      <button class="f-btn primary" onclick="saveScene()">Save</button>
    </div>
  </div>
  <div class="pill-row" id="scenes-fav" style="margin-bottom:8px"></div>
  <div id="scenes-more-wrap" style="display:none;margin-bottom:8px">
    <div class="pill-row" id="scenes-more"></div>
  </div>
  <button class="more-btn" id="scenes-more-btn" onclick="toggleMoreScenes()">More ▾</button>
</div>

<div class="sep"></div>

<!-- Colors -->
<div class="sec">
  <div class="sec-label" style="margin-bottom:12px">Colours</div>
  <div class="colors-grid" id="colors"></div>
</div>

<div class="sep"></div>

<!-- Effects -->
<div class="sec">
  <div class="sec-head">
    <div class="sec-label">Effects</div>
    <button class="add-btn" onclick="toggleForm('effect-form')">+ Add</button>
  </div>
  <div class="add-form" id="effect-form">
    <input class="field" id="ef-name" placeholder="Effect name (e.g. Blue pulse)">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
      <span style="font-size:12px;color:var(--dim)">Loop</span>
      <input type="checkbox" id="ef-loop" checked style="width:18px;height:18px;accent-color:var(--gold)">
    </div>

    <!-- Steps list -->
    <div id="ef-steps-list" style="display:flex;flex-direction:column;gap:6px;margin-bottom:8px"></div>

    <!-- Add step row -->
    <div style="background:var(--card2);border-radius:10px;padding:10px;display:flex;flex-direction:column;gap:8px">
      <div class="form-row" style="flex-wrap:wrap;gap:6px">
        <select class="field" id="ef-step-type" onchange="renderStepFields()" style="min-width:110px;flex:none">
          <option value="brightness">Brightness</option>
          <option value="color">Colour</option>
          <option value="wait">Wait</option>
          <option value="on">On</option>
          <option value="off">Off</option>
        </select>
        <div id="ef-step-bri-fields" style="display:flex;gap:6px;flex:1;min-width:0">
          <input class="field" id="ef-step-bri" type="number" min="1" max="254" placeholder="Brightness 1–254" style="flex:1">
        </div>
        <div id="ef-step-col-fields" style="display:none;gap:6px;flex:1">
          <input class="field" id="ef-step-hue" type="number" min="0" max="360" placeholder="Hue 0–360" style="flex:1">
          <input class="field" id="ef-step-sat" type="number" min="0" max="100" placeholder="Sat 90" style="flex:1">
        </div>
        <input class="field" id="ef-step-dur" type="number" min="0.1" step="0.1" placeholder="Duration (s)" value="1" style="width:110px;flex:none">
        <button class="f-btn primary" style="flex:none;padding:0 14px" onclick="addStep()">+ Step</button>
      </div>
    </div>

    <div class="form-actions" style="margin-top:4px">
      <button class="f-btn secondary" onclick="clearEffectForm();toggleForm('effect-form')">Cancel</button>
      <button class="f-btn primary" onclick="saveCustomEffect()">Save effect</button>
    </div>
  </div>
  <div class="pill-row" id="effects"></div>
</div>

<div class="sep"></div>

<!-- Lights -->
<div class="sec">
  <div class="sec-label" style="margin-bottom:12px">Lights</div>
  <div class="lights-list" id="lights"></div>
</div>

<script>
const api = (p, m='GET', b) => fetch(p, {
  method: m,
  headers: b ? {'Content-Type':'application/json'} : {},
  body: b ? JSON.stringify(b) : undefined,
}).then(r => r.ok ? r.json() : Promise.reject(r));

// ── Helpers ──────────────────────────────────────────────
function toggleForm(id) {
  const el = document.getElementById(id);
  el.classList.toggle('open');
}

function makeItem(label, onApply, onDelete) {
  const wrap = document.createElement('div');
  wrap.className = 'item-wrap';
  const pill = document.createElement('button');
  pill.className = 'pill';
  pill.textContent = label;
  pill.onclick = onApply;
  wrap.appendChild(pill);
  if (onDelete) {
    const d = document.createElement('button');
    d.className = 'del-btn';
    d.textContent = '×';
    d.onclick = onDelete;
    wrap.appendChild(d);
  }
  return wrap;
}

// ── Groups ───────────────────────────────────────────────
async function loadGroups() {
  const groups = await api('/groups');
  const el = document.getElementById('groups');
  el.innerHTML = '';
  for (const [name] of Object.entries(groups)) {
    el.innerHTML += `<div class="group-card">
      <div class="group-name">${name}</div>
      <div class="group-btns">
        <button class="btn-on"  onclick="api('/groups/${name}/on','PUT').then(refresh)">On</button>
        <button class="btn-off" onclick="api('/groups/${name}/off','PUT').then(refresh)">Off</button>
      </div>
    </div>`;
  }
}

// ── Profiles ─────────────────────────────────────────────
async function loadProfiles() {
  const profiles = await api('/profiles');
  const el = document.getElementById('profiles');
  el.innerHTML = '';
  for (const name of Object.keys(profiles)) {
    el.appendChild(makeItem(name,
      () => api(`/profiles/${encodeURIComponent(name)}/apply`,'PUT').then(refresh),
      () => api(`/profiles/${encodeURIComponent(name)}`, 'DELETE').then(loadProfiles)
    ));
  }
}

async function captureProfile() {
  const first = _lamp_state_first();
  if (first) {
    document.getElementById('pf-bri').value = first.brightness ?? '';
    document.getElementById('pf-ct').value  = first.color_temp ?? '';
  }
}

function _lamp_state_first() {
  const cards = document.querySelectorAll('[id^="lcard-"]');
  for (const c of cards) {
    if (c.classList.contains('on')) {
      const sub = c.querySelector('.light-sub')?.textContent || '';
      return null; // just returns null, real data fetched from API
    }
  }
  return null;
}

async function saveProfile() {
  const name = document.getElementById('pf-name').value.trim();
  const bri  = parseInt(document.getElementById('pf-bri').value);
  const ct   = parseInt(document.getElementById('pf-ct').value);
  if (!name || isNaN(bri) || isNaN(ct)) return;
  await api('/profiles', 'POST', {name, brightness: bri, color_temp: ct, transition: 1});
  document.getElementById('pf-name').value = '';
  document.getElementById('pf-bri').value  = '';
  document.getElementById('pf-ct').value   = '';
  toggleForm('profile-form');
  loadProfiles();
}

// ── Scenes ───────────────────────────────────────────────
const FAV_KEY = 'ls_favs';
const DEF_FAVS = ['evening','cinema','party'];
let _allScenes = [];
let _moreOpen = false;

function getFavs() {
  try { return JSON.parse(localStorage.getItem(FAV_KEY)) || DEF_FAVS; }
  catch { return DEF_FAVS; }
}
function setFavs(f) { localStorage.setItem(FAV_KEY, JSON.stringify(f)); }
function toggleFav(name) {
  const f = getFavs(), i = f.indexOf(name);
  if (i >= 0) f.splice(i,1); else f.push(name);
  setFavs(f); renderScenes();
}

function makeScenePill(name, isFav) {
  const wrap = document.createElement('div');
  wrap.className = 'item-wrap';
  const pill = document.createElement('button');
  pill.className = 'pill';
  pill.textContent = name;
  pill.onclick = () => api(`/scenes/${encodeURIComponent(name)}/apply`,'PUT').then(refresh);
  const star = document.createElement('button');
  star.className = 'star' + (isFav ? ' on' : '');
  star.textContent = isFav ? '★' : '☆';
  star.onclick = () => toggleFav(name);
  const del = document.createElement('button');
  del.className = 'del-btn';
  del.textContent = '×';
  del.onclick = () => api(`/scenes/${encodeURIComponent(name)}`, 'DELETE').then(loadScenes);
  wrap.append(pill, star, del);
  return wrap;
}

function renderScenes() {
  const favs   = getFavs();
  const pinned = _allScenes.filter(n => favs.includes(n));
  const rest   = _allScenes.filter(n => !favs.includes(n));
  const favEl  = document.getElementById('scenes-fav');
  favEl.innerHTML = '';
  for (const n of pinned) favEl.appendChild(makeScenePill(n, true));
  if (!pinned.length) favEl.innerHTML = '<span style="color:var(--dim);font-size:13px">Star scenes to pin them here</span>';
  const moreEl = document.getElementById('scenes-more');
  moreEl.innerHTML = '';
  for (const n of rest) moreEl.appendChild(makeScenePill(n, false));
  const btn = document.getElementById('scenes-more-btn');
  btn.style.display = rest.length ? '' : 'none';
}

function toggleMoreScenes() {
  _moreOpen = !_moreOpen;
  document.getElementById('scenes-more-wrap').style.display = _moreOpen ? 'block' : 'none';
  document.getElementById('scenes-more-btn').textContent = _moreOpen ? 'Less ▴' : 'More ▾';
}

async function loadScenes() {
  const scenes = await api('/scenes');
  _allScenes = Object.keys(scenes);
  renderScenes();
}

async function captureScene() {
  const name = document.getElementById('sc-name').value.trim();
  if (!name) { document.getElementById('sc-name').focus(); return; }
  await api('/scenes/capture', 'POST', {name});
  document.getElementById('sc-name').value = '';
  toggleForm('scene-form');
  loadScenes();
}

async function saveScene() {
  const name = document.getElementById('sc-name').value.trim();
  const bri  = parseInt(document.getElementById('sc-bri').value);
  const ct   = parseInt(document.getElementById('sc-ct').value);
  const hue  = parseInt(document.getElementById('sc-hue').value);
  const sat  = parseInt(document.getElementById('sc-sat').value);
  if (!name || isNaN(bri)) return;
  const body = {name, brightness: bri};
  if (!isNaN(ct))  body.color_temp = ct;
  if (!isNaN(hue)) body.color = {hue, saturation: isNaN(sat) ? 90 : sat};
  await api('/scenes', 'POST', body);
  ['sc-name','sc-bri','sc-ct','sc-hue','sc-sat'].forEach(id => document.getElementById(id).value='');
  toggleForm('scene-form');
  loadScenes();
}

// ── Colors ───────────────────────────────────────────────
// hsl from hue (0-360) at sat 70%, lightness 55%
function hueToCSS(hue) { return `hsl(${hue},70%,50%)`; }

const COLOR_HUES = {
  red:0, orange:25, yellow:55, green:120, cyan:180, blue:240, purple:280, pink:320
};

async function loadColors() {
  const el = document.getElementById('colors');
  el.innerHTML = '';
  for (const [name, hue] of Object.entries(COLOR_HUES)) {
    const sw = document.createElement('div');
    sw.className = 'color-swatch';
    sw.style.background = `linear-gradient(135deg, hsl(${hue},80%,45%), hsl(${hue},70%,30%))`;
    sw.innerHTML = `<div class="color-label">${name}</div>`;
    sw.onclick = () => {
      document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('sel'));
      sw.classList.add('sel');
      api(`/colors/${name}/apply`, 'PUT').then(refresh);
    };
    el.appendChild(sw);
  }
}

// ── Effects ──────────────────────────────────────────────
let _pendingSteps = [];

function renderStepFields() {
  const type = document.getElementById('ef-step-type').value;
  document.getElementById('ef-step-bri-fields').style.display = type === 'brightness' ? 'flex' : 'none';
  document.getElementById('ef-step-col-fields').style.display = type === 'color'      ? 'flex' : 'none';
}

function addStep() {
  const type = document.getElementById('ef-step-type').value;
  const dur  = parseFloat(document.getElementById('ef-step-dur').value) || 1;
  const step = { type, duration: dur };
  if (type === 'brightness') {
    const bri = parseInt(document.getElementById('ef-step-bri').value);
    if (isNaN(bri)) return;
    step.brightness = bri;
  } else if (type === 'color') {
    const hue = parseInt(document.getElementById('ef-step-hue').value);
    if (isNaN(hue)) return;
    step.hue = hue;
    const sat = parseInt(document.getElementById('ef-step-sat').value);
    step.saturation = isNaN(sat) ? 90 : sat;
  }
  _pendingSteps.push(step);
  renderStepList();
}

function renderStepList() {
  const el = document.getElementById('ef-steps-list');
  el.innerHTML = '';
  _pendingSteps.forEach((step, i) => {
    const row = document.createElement('div');
    row.style.cssText = 'display:flex;align-items:center;gap:8px;background:var(--card2);border-radius:8px;padding:8px 10px';
    let desc = `<span style="color:var(--gold);font-size:12px;font-weight:600;min-width:70px">${step.type}</span>`;
    if (step.brightness != null) desc += `<span style="font-size:13px">bri ${step.brightness}</span>`;
    if (step.hue        != null) desc += `<span style="font-size:13px">hue ${step.hue}° sat ${step.saturation}</span>`;
    desc += `<span style="color:var(--dim);font-size:12px;margin-left:auto">${step.duration}s</span>`;
    const del = document.createElement('button');
    del.className = 'del-btn'; del.textContent = '×';
    del.onclick = () => { _pendingSteps.splice(i, 1); renderStepList(); };
    row.innerHTML = desc;
    row.appendChild(del);
    el.appendChild(row);
  });
}

function clearEffectForm() {
  _pendingSteps = [];
  document.getElementById('ef-name').value = '';
  document.getElementById('ef-loop').checked = true;
  renderStepList();
}

async function saveCustomEffect() {
  const name = document.getElementById('ef-name').value.trim();
  if (!name || !_pendingSteps.length) return;
  await api('/effects/custom', 'POST', {
    name,
    steps: _pendingSteps,
    loop: document.getElementById('ef-loop').checked,
  });
  clearEffectForm();
  toggleForm('effect-form');
  loadEffects();
}

async function loadEffects() {
  const data = await api('/effects');
  const el = document.getElementById('effects');
  el.innerHTML = '';

  for (const name of data.firmware) {
    const pill = document.createElement('button');
    pill.className = 'pill';
    pill.textContent = name.replace(/_/g,' ');
    pill.onclick = () => {
      document.querySelectorAll('#effects .pill').forEach(p => p.classList.remove('sel2'));
      pill.classList.add('sel2');
      api(`/effects/${name}/all`, 'PUT');
    };
    el.appendChild(pill);
  }

  for (const [name] of Object.entries(data.user_defined || {})) {
    el.appendChild(makeItem(
      `★ ${name}`,
      () => {
        document.querySelectorAll('#effects .pill').forEach(p => p.classList.remove('sel2'));
        api(`/effects/${encodeURIComponent(name)}/all`, 'PUT');
      },
      () => api(`/effects/custom/${encodeURIComponent(name)}`, 'DELETE').then(loadEffects)
    ));
  }
}

// ── Lights ───────────────────────────────────────────────
let _brTimers = {};
let _brTouched = {};
let _masterTouched = 0;
let _masterTimer = null;

function setMasterBri(val) {
  _masterTouched = Date.now();
  document.getElementById('master-bri-pct').textContent = Math.round(val / 2.54) + '%';
  clearTimeout(_masterTimer);
  _masterTimer = setTimeout(() => api(`/lights/all/brightness/${val}`, 'PUT'), 120);
}

function updateMasterSlider(lights) {
  if (Date.now() - _masterTouched < 3000) return;
  const vals = lights.filter(l => l.brightness != null && l.state === 'ON').map(l => l.brightness);
  if (!vals.length) return;
  const avg = Math.round(vals.reduce((a,b) => a+b, 0) / vals.length);
  document.getElementById('master-bri').value = avg;
  document.getElementById('master-bri-pct').textContent = Math.round(avg / 2.54) + '%';
} // name → timestamp of last user interaction
const BR_LOCK_MS = 3000; // suppress MQTT updates to slider for this long after touch

function renderLights(lights) {
  const el = document.getElementById('lights');
  const now = Date.now();
  for (const light of lights) {
    if (light.brightness == null && light.color_temp == null) continue;
    const isOn = light.state === 'ON';
    const sub = [
      light.brightness != null ? `${Math.round(light.brightness/2.54)}%` : null,
      light.color?.hue != null ? `${Math.round(light.color.hue)}° hue` : (light.color_temp != null ? `${light.color_temp} m` : null),
    ].filter(Boolean).join(' · ');

    let card = document.getElementById(`lcard-${light.name}`);
    if (!card) {
      const w = document.createElement('div');
      w.innerHTML = `
        <div class="light-card${isOn?' on':''}" id="lcard-${light.name}">
          <div class="light-row">
            <div class="light-dot"></div>
            <div class="light-info">
              <div class="light-name">${light.name.replace(/-/g,' ')}</div>
              <div class="light-sub" id="lsub-${light.name}">${sub||'—'}</div>
            </div>
            <button class="toggle" onclick="api('/lights/${light.name}/toggle','PUT').then(refresh)"></button>
          </div>
          <div class="br-row" id="lbr-${light.name}" style="display:${isOn?'block':'none'}">
            <input type="range" min="1" max="254" value="${light.brightness??127}"
              id="lrange-${light.name}"
              oninput="setBri('${light.name}',this.value)"
              onpointerdown="_brTouched['${light.name}']=Date.now()"
              ontouchstart="_brTouched['${light.name}']=Date.now()">
          </div>
        </div>`;
      el.appendChild(w);
    } else {
      card.className = `light-card${isOn?' on':''}`;
      document.getElementById(`lsub-${light.name}`).textContent = sub||'—';
      document.getElementById(`lbr-${light.name}`).style.display = isOn?'block':'none';
      const r = document.getElementById(`lrange-${light.name}`);
      const recentlyTouched = (_brTouched[light.name] || 0) + BR_LOCK_MS > now;
      if (r && !recentlyTouched && light.brightness != null) r.value = light.brightness;
    }
  }
}

function setBri(name, val) {
  _brTouched[name] = Date.now();
  clearTimeout(_brTimers[name]);
  _brTimers[name] = setTimeout(() => api(`/lights/${name}/brightness/${val}`, 'PUT'), 120);
}

// ── Refresh ──────────────────────────────────────────────
async function refresh() {
  try {
    const lights = await api('/lights');
    document.getElementById('dot').className='ok';
    renderLights(lights);
    updateMasterSlider(lights);
  } catch { document.getElementById('dot').className='err'; }
}

async function init() {
  try {
    await Promise.all([loadGroups(),loadProfiles(),loadScenes(),loadColors(),loadEffects()]);
    await refresh();
  } catch { document.getElementById('dot').className='err'; }
  setInterval(refresh,4000);
}

if('serviceWorker' in navigator) navigator.serviceWorker.register('/static/sw.js');
init();
</script>
