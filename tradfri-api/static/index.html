<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Home</title>
  <link rel="manifest" href="/static/manifest.json">
  <meta name="theme-color" content="#08090f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #08090f;
      --card:     #10111a;
      --card2:    #181924;
      --card3:    #202230;
      --border:   rgba(120,130,200,0.09);
      --border2:  rgba(120,130,200,0.16);
      --text:     #e8eaf6;
      --dim:      #7a8199;
      --dim2:     #2e3048;
      --gold:     #f0a500;
      --gold2:    #d4900a;
      --gold-bg:  rgba(240,165,0,0.12);
      --gold-glow:rgba(240,165,0,0.22);
      --purple:   #8b7cf8;
      --purple-bg:rgba(139,124,248,0.14);
      --green:    #2ecc71;
      --red:      #e74c6f;
      --blue:     #4f8ef7;
      --r:        20px;
      --r-s:      14px;
      --safe-t: env(safe-area-inset-top,    0px);
      --safe-b: env(safe-area-inset-bottom, 0px);
      --safe-l: env(safe-area-inset-left,   0px);
      --safe-r: env(safe-area-inset-right,  0px);
    }
    html { background: var(--bg); }
    body {
      min-height: 100dvh;
      background: radial-gradient(ellipse at 50% 0%, #12152a 0%, var(--bg) 60%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', sans-serif;
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
      overflow-x: hidden;
      padding-bottom: calc(72px + var(--safe-b));
    }

    /* ── Tab pages ── */
    .page { display: none; padding-top: calc(var(--safe-t) + 8px); }
    .page.active { display: block; }

    /* ── Bottom nav ── */
    nav {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
      background: rgba(8,9,15,0.88);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-top: 1px solid var(--border);
      display: flex;
      padding-bottom: var(--safe-b);
    }
    .nav-tab {
      flex: 1; display: flex; flex-direction: column; align-items: center;
      gap: 3px; padding: 10px 0 8px; border: none; background: none;
      cursor: pointer; color: var(--dim); transition: color .2s;
    }
    .nav-tab.active { color: var(--gold); }
    .nav-icon { font-size: 22px; line-height: 1; }
    .nav-label { font-size: 10px; font-weight: 600; letter-spacing: .02em; }

    /* ── Header ── */
    .page-header {
      display: flex; align-items: flex-end; justify-content: space-between;
      padding: 12px 20px 20px;
    }
    .page-title { font-size: 32px; font-weight: 700; letter-spacing: -0.8px; }
    .page-sub   { font-size: 14px; color: var(--dim); margin-top: 2px; }
    .header-right { display: flex; align-items: center; gap: 10px; }
    #dot { width: 9px; height: 9px; border-radius: 50%; background: var(--dim2); transition: background .4s; flex-shrink:0; }
    #dot.ok  { background: var(--green); box-shadow: 0 0 8px var(--green); }
    #dot.err { background: var(--red); }

    /* ── Section ── */
    .sec { padding: 0 16px 28px; }
    .sec-head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px;
    }
    .sec-label {
      font-size: 11px; font-weight: 700; letter-spacing: .09em;
      text-transform: uppercase; color: var(--dim);
    }
    .add-btn {
      background: var(--card2); border: 1px solid var(--border2);
      color: var(--gold); border-radius: 10px; padding: 5px 13px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      transition: background .15s, transform .1s;
    }
    .add-btn:active { background: var(--card3); transform: scale(.95); }

    /* ── Master brightness card ── */
    .master-card {
      margin: 0 16px 28px;
      background: linear-gradient(160deg, #181928 0%, var(--card) 70%);
      border: 1px solid var(--border2);
      border-radius: var(--r);
      padding: 18px 20px;
      box-shadow: 0 1px 0 rgba(139,124,248,0.15) inset;
    }
    .master-top {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px;
    }
    .master-title { font-size: 15px; font-weight: 600; }
    .master-pct   { font-size: 28px; font-weight: 700; letter-spacing: -1px; color: var(--gold); }
    .master-slider-wrap { display: flex; align-items: center; gap: 10px; }
    .master-icon  { font-size: 16px; color: var(--dim); }

    /* ── Range inputs ── */
    input[type=range] {
      -webkit-appearance: none; width: 100%; height: 5px; border-radius: 3px;
      background: var(--card3); outline: none; cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 24px; height: 24px; border-radius: 50%;
      background: var(--gold); cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,.4), 0 0 0 3px rgba(245,166,35,.2);
    }
    input[type=range]::-webkit-slider-runnable-track { border-radius: 3px; }

    /* ── Room cards ── */
    .rooms-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .room-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--r); padding: 16px; cursor: pointer;
      transition: border-color .25s, background .25s, transform .1s;
      position: relative; overflow: hidden;
    }
    .room-card.on {
      border-color: rgba(245,166,35,.3);
      background: linear-gradient(145deg, rgba(240,165,0,.10) 0%, var(--card) 65%);
    }
    .room-card:active { transform: scale(.97); }
    .room-icon {
      font-size: 28px; line-height: 1; margin-bottom: 10px; display: block;
    }
    .room-name {
      font-size: 14px; font-weight: 600; text-transform: capitalize; margin-bottom: 10px;
    }
    .room-btns { display: flex; gap: 6px; }
    .r-btn {
      flex: 1; border: none; border-radius: 10px; font-size: 13px;
      font-weight: 600; cursor: pointer; padding: 9px 0;
      transition: opacity .15s, transform .1s;
    }
    .r-btn:active { opacity: .65; transform: scale(.96); }
    .r-btn.on  { background: var(--gold); color: #000; }
    .r-btn.off { background: var(--card2); color: var(--dim); border: 1px solid var(--border); }

    /* ── Quick profiles ── */
    .profiles-scroll {
      display: flex; gap: 10px; overflow-x: auto; padding-bottom: 4px;
      scrollbar-width: none; -webkit-overflow-scrolling: touch;
    }
    .profiles-scroll::-webkit-scrollbar { display: none; }
    .profile-card {
      flex-shrink: 0; display: flex; flex-direction: column; align-items: center;
      gap: 6px; background: var(--card); border: 1px solid var(--border);
      border-radius: var(--r-s); padding: 14px 16px; cursor: pointer;
      min-width: 76px;
      transition: background .15s, border-color .15s, transform .1s;
    }
    .profile-card:active { transform: scale(.94); }
    .profile-card.sel  { background: var(--gold-bg); border-color: var(--gold); }
    .profile-icon { font-size: 22px; line-height: 1; }
    .profile-name { font-size: 12px; font-weight: 600; color: var(--dim); white-space: nowrap; text-transform: capitalize; }
    .profile-card.sel .profile-name { color: var(--gold); }

    /* ── Scene grid ── */
    .scenes-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .scene-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--r); padding: 16px; cursor: pointer;
      display: flex; align-items: center; gap: 12px;
      transition: background .15s, border-color .15s, transform .1s;
      position: relative;
    }
    .scene-card:active { transform: scale(.96); }
    .scene-icon { font-size: 26px; line-height: 1; flex-shrink: 0; }
    .scene-info { flex: 1; min-width: 0; }
    .scene-name { font-size: 14px; font-weight: 600; text-transform: capitalize; }
    .scene-actions { position: absolute; top: 8px; right: 8px; display: flex; gap: 4px; }
    .star-btn {
      background: none; border: none; cursor: pointer; font-size: 14px;
      color: var(--dim2); padding: 2px; line-height: 1;
    }
    .star-btn.on { color: var(--gold); }
    .scene-del {
      background: none; border: none; cursor: pointer; font-size: 16px;
      color: var(--dim2); padding: 2px; line-height: 1; transition: color .15s;
    }
    .scene-del:active { color: var(--red); }
    .scenes-divider {
      font-size: 11px; font-weight: 700; letter-spacing: .09em;
      text-transform: uppercase; color: var(--dim);
      margin: 20px 0 12px;
    }

    /* ── Colour swatches ── */
    .colors-scroll {
      display: flex; gap: 12px; overflow-x: auto; padding-bottom: 4px;
      scrollbar-width: none; -webkit-overflow-scrolling: touch;
    }
    .colors-scroll::-webkit-scrollbar { display: none; }
    .color-pill {
      flex-shrink: 0; display: flex; flex-direction: column; align-items: center; gap: 7px;
      cursor: pointer; transition: transform .15s;
    }
    .color-pill:active { transform: scale(.9); }
    .color-circle {
      width: 52px; height: 52px; border-radius: 50%;
      border: 3px solid transparent; transition: border-color .15s, transform .15s;
    }
    .color-pill.sel .color-circle { border-color: #fff; transform: scale(1.1); }
    .color-name { font-size: 11px; font-weight: 600; color: var(--dim); text-transform: capitalize; }

    /* ── Effects ── */
    .effects-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
    .effect-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--r); padding: 16px; cursor: pointer;
      transition: background .15s, border-color .15s, transform .1s;
      position: relative;
    }
    .effect-card:active { transform: scale(.96); }
    .effect-card.sel { background: var(--purple-bg); border-color: var(--purple); }
    .effect-icon { font-size: 24px; line-height: 1; margin-bottom: 8px; }
    .effect-name { font-size: 13px; font-weight: 600; text-transform: capitalize; line-height: 1.3; }
    .effect-type { font-size: 11px; color: var(--dim); margin-top: 3px; }
    .effect-del {
      position: absolute; top: 8px; right: 8px;
      background: none; border: none; cursor: pointer; font-size: 16px;
      color: var(--dim2); padding: 2px; transition: color .15s;
    }
    .effect-del:active { color: var(--red); }

    /* ── Individual lights ── */
    .light-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--r); margin-bottom: 10px; overflow: hidden;
      transition: border-color .3s;
    }
    .light-card.on { border-color: rgba(240,165,0,.22); }
    .light-row {
      display: flex; align-items: center; padding: 16px 18px; gap: 14px;
    }
    .light-orb {
      width: 40px; height: 40px; border-radius: 50%; flex-shrink: 0;
      background: var(--dim2); display: flex; align-items: center; justify-content: center;
      font-size: 18px; transition: background .3s, box-shadow .3s;
    }
    .light-card.on .light-orb {
      background: radial-gradient(circle at 38% 38%, #ffe599, #f0a500);
      box-shadow: 0 0 18px rgba(240,165,0,.55);
    }
    .light-info { flex: 1; min-width: 0; }
    .light-name { font-size: 15px; font-weight: 600; text-transform: capitalize; }
    .light-sub  { font-size: 12px; color: var(--dim); margin-top: 3px; }
    .toggle {
      width: 51px; height: 31px; border-radius: 999px; border: none;
      background: var(--dim2); cursor: pointer; position: relative; flex-shrink: 0;
      transition: background .25s;
    }
    .toggle::after {
      content: ''; position: absolute; top: 2px; left: 2px;
      width: 27px; height: 27px; border-radius: 50%; background: #fff;
      box-shadow: 0 2px 6px rgba(0,0,0,.4);
      transition: transform .25s cubic-bezier(.4,0,.2,1);
    }
    .light-card.on .toggle { background: var(--gold); }
    .light-card.on .toggle::after { transform: translateX(20px); }
    .light-slider-row { padding: 0 18px 14px; }

    /* ── Add forms ── */
    .add-form {
      display: none; flex-direction: column; gap: 10px;
      background: var(--card); border: 1px solid var(--border2);
      border-radius: var(--r); padding: 16px; margin-bottom: 14px;
    }
    .add-form.open { display: flex; }
    .form-row { display: flex; gap: 8px; align-items: center; }
    .field {
      flex: 1; background: var(--card2); border: 1px solid var(--border);
      border-radius: 12px; padding: 11px 14px; color: var(--text);
      font-size: 14px; outline: none; min-height: 44px;
      transition: border-color .2s;
    }
    .field:focus { border-color: var(--gold); }
    select.field { cursor: pointer; }
    .field-label { font-size: 12px; color: var(--dim); min-width: 78px; flex-shrink: 0; }
    .form-title { font-size: 16px; font-weight: 700; margin-bottom: 2px; }
    .form-actions { display: flex; gap: 8px; margin-top: 4px; }
    .f-btn {
      flex: 1; border: none; border-radius: 12px; font-size: 14px;
      font-weight: 600; cursor: pointer; padding: 12px 0;
      transition: opacity .15s, transform .1s;
    }
    .f-btn:active { opacity: .7; transform: scale(.97); }
    .f-btn.primary   { background: var(--gold); color: #000; }
    .f-btn.secondary { background: var(--card2); color: var(--dim); border: 1px solid var(--border); }
    .f-btn.capture   { background: var(--card3); color: var(--text); font-size: 13px; }

    /* ── Effect builder steps ── */
    .step-row {
      display: flex; align-items: center; gap: 8px;
      background: var(--card2); border-radius: 10px; padding: 9px 12px;
    }
    .step-type-badge {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .06em; color: var(--gold); min-width: 64px;
    }
    .step-desc { font-size: 13px; flex: 1; }
    .step-dur  { font-size: 12px; color: var(--dim); }
    .step-del  {
      background: none; border: 1px solid var(--border); color: var(--dim);
      border-radius: 50%; width: 22px; height: 22px; cursor: pointer;
      font-size: 14px; line-height: 1; flex-shrink: 0;
      transition: color .15s, border-color .15s;
    }
    .step-del:active { color: var(--red); border-color: var(--red); }

    /* ── Empty state ── */
    .empty { color: var(--dim); font-size: 13px; padding: 8px 0; }

    /* ── Divider ── */
    .sep { height: 1px; background: var(--border); margin: 0 16px 28px; }
  </style>
</head>
<body>

<!-- ── Bottom nav ───────────────────────────────────────── -->
<nav>
  <button class="nav-tab active" onclick="switchTab('home',this)">
    <span class="nav-icon">🏠</span>
    <span class="nav-label">Home</span>
  </button>
  <button class="nav-tab" onclick="switchTab('scenes',this)">
    <span class="nav-icon">🎬</span>
    <span class="nav-label">Scenes</span>
  </button>
  <button class="nav-tab" onclick="switchTab('effects',this)">
    <span class="nav-icon">✨</span>
    <span class="nav-label">Effects</span>
  </button>
  <button class="nav-tab" onclick="switchTab('lights',this)">
    <span class="nav-icon">💡</span>
    <span class="nav-label">Lights</span>
  </button>
</nav>

<!-- ══════════════ HOME ══════════════ -->
<div class="page active" id="page-home">
  <div class="page-header">
    <div>
      <div class="page-title" id="greeting">Good evening</div>
      <div class="page-sub">Bedroom</div>
    </div>
    <div class="header-right">
      <div id="dot"></div>
    </div>
  </div>

  <!-- Master brightness -->
  <div class="master-card">
    <div class="master-top">
      <div class="master-title">Brightness</div>
      <div class="master-pct" id="master-bri-pct">50%</div>
    </div>
    <div class="master-slider-wrap">
      <span class="master-icon">🌑</span>
      <input type="range" min="1" max="254" value="127" id="master-bri"
        style="flex:1"
        oninput="setMasterBri(this.value)"
        onpointerdown="_masterTouched=Date.now()"
        ontouchstart="_masterTouched=Date.now()">
      <span class="master-icon">☀️</span>
    </div>
  </div>

  <!-- Rooms -->
  <div class="sec">
    <div class="sec-label" style="margin-bottom:14px">Rooms</div>
    <div class="rooms-grid" id="groups"></div>
  </div>

  <!-- Profiles -->
  <div class="sec">
    <div class="sec-head">
      <div class="sec-label">Mood</div>
      <button class="add-btn" onclick="switchTab('scenes',document.querySelectorAll(\'.nav-tab\')[1])">Scenes →</button>
    </div>
    <div class="profiles-scroll" id="profiles"></div>
  </div>
</div>

<!-- ══════════════ SCENES ══════════════ -->
<div class="page" id="page-scenes">
  <div class="page-header">
    <div class="page-title">Scenes</div>
    <button class="add-btn" onclick="toggleForm('scene-form')">+ Add</button>
  </div>

  <div class="sec">
    <div class="add-form" id="scene-form">
      <div class="form-title">New Scene</div>
      <input class="field" id="sc-name" placeholder="Name  (e.g. Gaming)">
      <div class="form-row">
        <span class="field-label">Brightness</span>
        <input class="field" id="sc-bri" type="number" min="0" max="254" placeholder="0–254">
      </div>
      <div class="form-row">
        <span class="field-label">Colour temp</span>
        <input class="field" id="sc-ct" type="number" min="150" max="500" placeholder="250 cool → 454 warm">
      </div>
      <div class="form-row">
        <span class="field-label">Hue</span>
        <input class="field" id="sc-hue" type="number" min="0" max="360" placeholder="0–360">
        <span class="field-label" style="min-width:36px">Sat</span>
        <input class="field" id="sc-sat" type="number" min="0" max="100" placeholder="90">
      </div>
      <div class="form-actions">
        <button class="f-btn capture" onclick="captureScene()">Capture</button>
        <button class="f-btn secondary" onclick="toggleForm('scene-form')">Cancel</button>
        <button class="f-btn primary" onclick="saveScene()">Save</button>
      </div>
    </div>

    <!-- Favourites -->
    <div class="sec-label" style="margin-bottom:12px">Favourites</div>
    <div class="scenes-grid" id="scenes-fav"></div>

    <!-- All scenes -->
    <div id="scenes-rest-wrap">
      <div class="scenes-divider">All Scenes</div>
      <div class="scenes-grid" id="scenes-more"></div>
    </div>

    <!-- Colours -->
    <div class="scenes-divider" style="margin-top:24px">Colours</div>
    <div class="colors-scroll" id="colors"></div>

    <!-- Profile management -->
    <div class="scenes-divider" style="margin-top:24px">Profiles</div>
    <div class="add-form" id="profile-form" style="margin-bottom:12px">
      <div class="form-title">New Profile</div>
      <input class="field" id="pf-name" placeholder="Name  (e.g. Study)">
      <div class="form-row">
        <span class="field-label">Brightness</span>
        <input class="field" id="pf-bri" type="number" min="0" max="254" placeholder="0–254">
      </div>
      <div class="form-row">
        <span class="field-label">Colour temp</span>
        <input class="field" id="pf-ct" type="number" min="150" max="500" placeholder="250–454">
      </div>
      <div class="form-actions">
        <button class="f-btn capture" onclick="captureProfile()">Capture</button>
        <button class="f-btn secondary" onclick="toggleForm('profile-form')">Cancel</button>
        <button class="f-btn primary" onclick="saveProfile()">Save</button>
      </div>
    </div>
    <div style="display:flex;justify-content:flex-end;margin-bottom:12px">
      <button class="add-btn" onclick="toggleForm('profile-form')">+ Profile</button>
    </div>
    <div class="profiles-scroll" id="profiles-full"></div>
  </div>
</div>

<!-- ══════════════ EFFECTS ══════════════ -->
<div class="page" id="page-effects">
  <div class="page-header">
    <div class="page-title">Effects</div>
    <div style="display:flex;gap:8px;align-items:center">
      <button onclick="stopEffects()" style="background:#ff375f22;border:1px solid #ff375f55;color:#ff375f;border-radius:10px;padding:5px 13px;font-size:13px;font-weight:600;cursor:pointer">⏹ Stop</button>
      <button class="add-btn" onclick="toggleForm('effect-form')">+ Add</button>
    </div>
  </div>

  <div class="sec">
    <div class="add-form" id="effect-form">
      <div class="form-title">New Effect</div>
      <input class="field" id="ef-name" placeholder="Name  (e.g. Blue pulse)">
      <div style="display:flex;align-items:center;gap:10px">
        <span style="font-size:13px;color:var(--dim)">Loop</span>
        <input type="checkbox" id="ef-loop" checked style="width:20px;height:20px;accent-color:var(--gold)">
      </div>

      <div id="ef-steps-list" style="display:flex;flex-direction:column;gap:6px"></div>

      <!-- Step builder -->
      <div style="background:var(--card2);border-radius:14px;padding:12px;display:flex;flex-direction:column;gap:10px">
        <div style="font-size:12px;font-weight:600;color:var(--dim);text-transform:uppercase;letter-spacing:.07em">Add step</div>
        <div class="form-row" style="flex-wrap:wrap;gap:8px">
          <select class="field" id="ef-step-type" onchange="renderStepFields()" style="min-width:120px;flex:none">
            <option value="brightness">Brightness</option>
            <option value="color">Colour</option>
            <option value="wait">Wait</option>
            <option value="on">On</option>
            <option value="off">Off</option>
          </select>
          <div id="ef-step-bri-fields" style="display:flex;gap:6px;flex:1;min-width:120px">
            <input class="field" id="ef-step-bri" type="number" min="1" max="254" placeholder="Brightness 1–254">
          </div>
          <div id="ef-step-col-fields" style="display:none;gap:6px;flex:1;min-width:180px">
            <input class="field" id="ef-step-hue" type="number" min="0" max="360" placeholder="Hue 0–360">
            <input class="field" id="ef-step-sat" type="number" min="0" max="100" placeholder="Sat 90">
          </div>
          <input class="field" id="ef-step-dur" type="number" min="0.1" step="0.1" value="1" placeholder="Sec" style="width:80px;flex:none">
          <button class="f-btn primary" style="flex:none;padding:0 18px" onclick="addStep()">+ Step</button>
        </div>
      </div>

      <div class="form-actions">
        <button class="f-btn secondary" onclick="clearEffectForm();toggleForm('effect-form')">Cancel</button>
        <button class="f-btn primary" onclick="saveCustomEffect()">Save effect</button>
      </div>
    </div>

    <!-- Firmware effects -->
    <div class="sec-label" style="margin-bottom:14px">Firmware</div>
    <div class="effects-grid" id="effects-firmware"></div>

    <!-- User effects -->
    <div class="sec-label" style="margin-bottom:14px;margin-top:4px">Custom</div>
    <div class="effects-grid" id="effects-user"></div>
  </div>
</div>

<!-- ══════════════ LIGHTS ══════════════ -->
<div class="page" id="page-lights">
  <div class="page-header">
    <div class="page-title">Lights</div>
  </div>
  <div class="sec">
    <div id="lights"></div>
  </div>
</div>

<script>
// ── Tab navigation ────────────────────────────────────────
function switchTab(id, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  btn.classList.add('active');
}

// ── API helper ────────────────────────────────────────────
const api = (p, m='GET', b) => fetch(p, {
  method: m,
  headers: b ? {'Content-Type':'application/json'} : {},
  body: b ? JSON.stringify(b) : undefined,
}).then(r => r.ok ? r.json() : Promise.reject(r));

function toggleForm(id) {
  document.getElementById(id).classList.toggle('open');
}

// ── Greeting ──────────────────────────────────────────────
function setGreeting() {
  const h = new Date().getHours();
  const g = h < 12 ? 'Good morning' : h < 17 ? 'Good afternoon' : 'Good evening';
  document.getElementById('greeting').textContent = g;
}

// ── Room icons ────────────────────────────────────────────
const ROOM_ICONS = { bedroom:'🛏️', desk:'🖥️', bedside:'🌙', ambient:'🪴', living:'🛋️', kitchen:'🍳' };

// ── Groups ────────────────────────────────────────────────
async function loadGroups() {
  const groups = await api('/groups');
  const el = document.getElementById('groups');
  el.innerHTML = '';
  for (const name of Object.keys(groups)) {
    const icon = ROOM_ICONS[name] || '💡';
    el.innerHTML += `
      <div class="room-card" id="rcard-${name}">
        <span class="room-icon">${icon}</span>
        <div class="room-name">${name}</div>
        <div class="room-btns">
          <button class="r-btn on"  onclick="api('/groups/${name}/on','PUT').then(refresh)">On</button>
          <button class="r-btn off" onclick="api('/groups/${name}/off','PUT').then(refresh)">Off</button>
        </div>
      </div>`;
  }
}

// ── Profile icons ─────────────────────────────────────────
const PROFILE_ICONS = {
  bright:'☀️', focus:'🎯', reading:'📖', relax:'😌',
  dim:'🌒', night:'🌑', off:'⭕'
};

function renderProfileCard(name, container, onApply, onDelete) {
  const icon = PROFILE_ICONS[name] || '💡';
  const card = document.createElement('div');
  card.className = 'profile-card';
  card.id = `pcard-${name}`;
  card.innerHTML = `<span class="profile-icon">${icon}</span><span class="profile-name">${name}</span>`;
  card.onclick = () => {
    document.querySelectorAll('.profile-card').forEach(c => c.classList.remove('sel'));
    document.querySelectorAll(`[id="pcard-${name}"]`).forEach(c => c.classList.add('sel'));
    onApply();
  };
  container.appendChild(card);
}

async function loadProfiles() {
  const profiles = await api('/profiles');
  const el1 = document.getElementById('profiles');
  const el2 = document.getElementById('profiles-full');
  el1.innerHTML = ''; el2.innerHTML = '';
  for (const name of Object.keys(profiles)) {
    const apply = () => api(`/profiles/${encodeURIComponent(name)}/apply`,'PUT').then(refresh);
    renderProfileCard(name, el1, apply, null);
    renderProfileCard(name, el2, apply,
      () => api(`/profiles/${encodeURIComponent(name)}`, 'DELETE').then(loadProfiles)
    );
  }
}

async function captureProfile() {
  const lights = await api('/lights');
  const on = lights.filter(l => l.brightness != null && l.state === 'ON');
  if (on.length) {
    const avg = Math.round(on.reduce((a,b) => a + (b.brightness||0), 0) / on.length);
    const ct  = on[0].color_temp;
    document.getElementById('pf-bri').value = avg;
    if (ct) document.getElementById('pf-ct').value = ct;
  }
}

async function saveProfile() {
  const name = document.getElementById('pf-name').value.trim();
  const bri  = parseInt(document.getElementById('pf-bri').value);
  const ct   = parseInt(document.getElementById('pf-ct').value);
  if (!name || isNaN(bri) || isNaN(ct)) return;
  await api('/profiles', 'POST', {name, brightness: bri, color_temp: ct, transition: 1});
  ['pf-name','pf-bri','pf-ct'].forEach(id => document.getElementById(id).value='');
  toggleForm('profile-form');
  loadProfiles();
}

// ── Scene icons ───────────────────────────────────────────
const SCENE_ICONS = {
  evening:'🌆', sunrise:'🌅', party:'🎉', pulse:'💓',
  candlelight:'🕯️', cinema:'🎬', energise:'⚡', relax:'🌿',
  gaming:'🎮', reading:'📖', chill:'❄️', romance:'🌹'
};

const FAV_KEY  = 'ls_favs';
const DEF_FAVS = ['evening','cinema','party'];
let _allScenes = [];

function getFavs() { try { return JSON.parse(localStorage.getItem(FAV_KEY)) || DEF_FAVS; } catch { return DEF_FAVS; } }
function setFavs(f) { localStorage.setItem(FAV_KEY, JSON.stringify(f)); }
function toggleFav(name) {
  const f = getFavs(), i = f.indexOf(name);
  if (i >= 0) f.splice(i,1); else f.push(name);
  setFavs(f); renderScenes();
}

function makeSceneCard(name, isFav) {
  const icon = SCENE_ICONS[name] || '🔆';
  const card = document.createElement('div');
  card.className = 'scene-card';
  card.innerHTML = `
    <span class="scene-icon">${icon}</span>
    <div class="scene-info"><div class="scene-name">${name}</div></div>
    <div class="scene-actions">
      <button class="star-btn${isFav?' on':''}" title="${isFav?'Unpin':'Pin'}">${isFav?'★':'☆'}</button>
      <button class="scene-del" title="Delete">×</button>
    </div>`;
  card.querySelector('.scene-card')?.addEventListener('click', () => {});
  card.onclick = (e) => {
    if (e.target.classList.contains('star-btn')) { toggleFav(name); return; }
    if (e.target.classList.contains('scene-del')) {
      api(`/scenes/${encodeURIComponent(name)}`, 'DELETE').then(loadScenes); return;
    }
    api(`/scenes/${encodeURIComponent(name)}/apply`, 'PUT').then(refresh);
  };
  return card;
}

function renderScenes() {
  const favs   = getFavs();
  const pinned = _allScenes.filter(n => favs.includes(n));
  const rest   = _allScenes.filter(n => !favs.includes(n));

  const favEl = document.getElementById('scenes-fav');
  favEl.innerHTML = '';
  if (pinned.length) pinned.forEach(n => favEl.appendChild(makeSceneCard(n, true)));
  else favEl.innerHTML = '<div class="empty">Star scenes to pin them here</div>';

  const moreEl = document.getElementById('scenes-more');
  moreEl.innerHTML = '';
  rest.forEach(n => moreEl.appendChild(makeSceneCard(n, false)));
}

async function loadScenes() {
  const scenes = await api('/scenes');
  _allScenes = Object.keys(scenes);
  renderScenes();
}

async function captureScene() {
  const name = document.getElementById('sc-name').value.trim();
  if (!name) { document.getElementById('sc-name').focus(); return; }
  await api('/scenes/capture', 'POST', {name});
  document.getElementById('sc-name').value = '';
  toggleForm('scene-form');
  loadScenes();
}

async function saveScene() {
  const name = document.getElementById('sc-name').value.trim();
  const bri  = parseInt(document.getElementById('sc-bri').value);
  const ct   = parseInt(document.getElementById('sc-ct').value);
  const hue  = parseInt(document.getElementById('sc-hue').value);
  const sat  = parseInt(document.getElementById('sc-sat').value);
  if (!name || isNaN(bri)) return;
  const body = {name, brightness: bri};
  if (!isNaN(ct))  body.color_temp = ct;
  if (!isNaN(hue)) body.color = {hue, saturation: isNaN(sat) ? 90 : sat};
  await api('/scenes', 'POST', body);
  ['sc-name','sc-bri','sc-ct','sc-hue','sc-sat'].forEach(id => document.getElementById(id).value='');
  toggleForm('scene-form');
  loadScenes();
}

// ── Colours ───────────────────────────────────────────────
const COLOR_HUES = { red:0, orange:25, yellow:55, green:120, cyan:180, blue:240, purple:280, pink:320 };

async function loadColors() {
  const el = document.getElementById('colors');
  el.innerHTML = '';
  for (const [name, hue] of Object.entries(COLOR_HUES)) {
    const pill = document.createElement('div');
    pill.className = 'color-pill';
    const circle = document.createElement('div');
    circle.className = 'color-circle';
    circle.style.background = `radial-gradient(circle at 32% 32%, hsl(${hue},95%,70%), hsl(${hue},88%,28%))`;
    const label = document.createElement('div');
    label.className = 'color-name';
    label.textContent = name;
    pill.append(circle, label);
    pill.onclick = () => {
      document.querySelectorAll('.color-pill').forEach(p => p.classList.remove('sel'));
      pill.classList.add('sel');
      api(`/colors/${name}/apply`, 'PUT').then(refresh);
    };
    el.appendChild(pill);
  }
}

// ── Effects ───────────────────────────────────────────────
const EFFECT_ICONS = {
  colorloop:'🌈', stop_colorloop:'⏹️', breathe:'🌬️', blink:'⚡',
  okay:'✅', finish:'🏁', stop:'⏹️',
  'slow breathe':'😮‍💨', 'slow breathe long':'💤', 'fast pulse':'💥',
  heartbeat:'❤️', 'rainbow slow':'🌈', 'rainbow fast':'⚡🌈',
  'red blue strobe':'🚨', 'blue breathe':'🫧', 'red breathe':'🔴',
  'purple breathe':'🟣', 'candle flicker':'🕯️', 'sunset fade':'🌇',
  ocean:'🌊', 'northern lights':'🌌', 'wake up':'☀️', 'wind down':'😴'
};

let _pendingSteps = [];

function renderStepFields() {
  const type = document.getElementById('ef-step-type').value;
  document.getElementById('ef-step-bri-fields').style.display = type === 'brightness' ? 'flex' : 'none';
  document.getElementById('ef-step-col-fields').style.display = type === 'color'      ? 'flex' : 'none';
}

function addStep() {
  const type = document.getElementById('ef-step-type').value;
  const dur  = parseFloat(document.getElementById('ef-step-dur').value) || 1;
  const step = { type, duration: dur };
  if (type === 'brightness') {
    const bri = parseInt(document.getElementById('ef-step-bri').value);
    if (isNaN(bri)) return;
    step.brightness = bri;
  } else if (type === 'color') {
    const hue = parseInt(document.getElementById('ef-step-hue').value);
    if (isNaN(hue)) return;
    step.hue = hue;
    const sat = parseInt(document.getElementById('ef-step-sat').value);
    step.saturation = isNaN(sat) ? 90 : sat;
  }
  _pendingSteps.push(step);
  renderStepList();
}

function renderStepList() {
  const el = document.getElementById('ef-steps-list');
  el.innerHTML = '';
  _pendingSteps.forEach((step, i) => {
    const row = document.createElement('div');
    row.className = 'step-row';
    let desc = '';
    if (step.brightness != null) desc = `bri ${step.brightness}`;
    else if (step.hue    != null) desc = `hue ${step.hue}° · sat ${step.saturation}`;
    const del = document.createElement('button');
    del.className = 'step-del'; del.textContent = '×';
    del.onclick = () => { _pendingSteps.splice(i, 1); renderStepList(); };
    row.innerHTML = `
      <span class="step-type-badge">${step.type}</span>
      <span class="step-desc">${desc}</span>
      <span class="step-dur">${step.duration}s</span>`;
    row.appendChild(del);
    el.appendChild(row);
  });
}

function clearEffectForm() {
  _pendingSteps = [];
  document.getElementById('ef-name').value = '';
  document.getElementById('ef-loop').checked = true;
  renderStepList();
}

async function saveCustomEffect() {
  const name = document.getElementById('ef-name').value.trim();
  if (!name || !_pendingSteps.length) return;
  await api('/effects/custom', 'POST', { name, steps: _pendingSteps, loop: document.getElementById('ef-loop').checked });
  clearEffectForm();
  toggleForm('effect-form');
  loadEffects();
}

function stopEffects() {
  api('/effects/stop', 'PUT');
  document.querySelectorAll('.effect-card').forEach(c => c.classList.remove('sel'));
}

async function loadEffects() {
  const data = await api('/effects');
  const fwEl   = document.getElementById('effects-firmware');
  const userEl = document.getElementById('effects-user');
  fwEl.innerHTML = ''; userEl.innerHTML = '';

  for (const name of data.firmware) {
    const card = document.createElement('div');
    card.className = 'effect-card';
    card.innerHTML = `
      <div class="effect-icon">${EFFECT_ICONS[name] || '✨'}</div>
      <div class="effect-name">${name.replace(/_/g,' ')}</div>
      <div class="effect-type">Firmware</div>`;
    card.onclick = () => {
      document.querySelectorAll('.effect-card').forEach(c => c.classList.remove('sel'));
      card.classList.add('sel');
      api(`/effects/${name}/all`, 'PUT');
    };
    fwEl.appendChild(card);
  }

  for (const [name] of Object.entries(data.user_defined || {})) {
    const card = document.createElement('div');
    card.className = 'effect-card';
    card.innerHTML = `
      <button class="effect-del" title="Delete">×</button>
      <div class="effect-icon">${EFFECT_ICONS[name] || '⚙️'}</div>
      <div class="effect-name">${name}</div>
      <div class="effect-type">Custom</div>`;
    card.querySelector('.effect-del').onclick = (e) => {
      e.stopPropagation();
      api(`/effects/custom/${encodeURIComponent(name)}`, 'DELETE').then(loadEffects);
    };
    card.onclick = () => {
      document.querySelectorAll('.effect-card').forEach(c => c.classList.remove('sel'));
      card.classList.add('sel');
      api(`/effects/${encodeURIComponent(name)}/all`, 'PUT');
    };
    userEl.appendChild(card);
  }

  if (!Object.keys(data.user_defined || {}).length)
    userEl.innerHTML = '<div class="empty">No custom effects yet — tap + Add above</div>';
}

// ── Individual lights ─────────────────────────────────────
let _brTimers  = {};
let _brTouched = {};
let _masterTouched = 0;
let _masterTimer   = null;

function setMasterBri(val) {
  _masterTouched = Date.now();
  document.getElementById('master-bri-pct').textContent = Math.round(val / 2.54) + '%';
  clearTimeout(_masterTimer);
  _masterTimer = setTimeout(() => api(`/lights/all/brightness/${val}`, 'PUT'), 120);
}

function updateMasterSlider(lights) {
  if (Date.now() - _masterTouched < 3000) return;
  const vals = lights.filter(l => l.brightness != null && l.state === 'ON').map(l => l.brightness);
  if (!vals.length) return;
  const avg = Math.round(vals.reduce((a,b) => a+b, 0) / vals.length);
  document.getElementById('master-bri').value = avg;
  document.getElementById('master-bri-pct').textContent = Math.round(avg / 2.54) + '%';
}

function renderLights(lights) {
  const el  = document.getElementById('lights');
  const now = Date.now();
  for (const light of lights) {
    if (light.brightness == null && light.color_temp == null) continue;
    const isOn = light.state === 'ON';
    const pct  = light.brightness != null ? `${Math.round(light.brightness/2.54)}%` : null;
    const col  = light.color?.hue != null
      ? `${Math.round(light.color.hue)}° hue`
      : (light.color_temp != null ? `${light.color_temp} K` : null);
    const sub  = [pct, col].filter(Boolean).join(' · ');

    let card = document.getElementById(`lcard-${light.name}`);
    if (!card) {
      const wrap = document.createElement('div');
      wrap.innerHTML = `
        <div class="light-card${isOn?' on':''}" id="lcard-${light.name}">
          <div class="light-row">
            <div class="light-orb">💡</div>
            <div class="light-info">
              <div class="light-name">${light.name.replace(/-/g,' ')}</div>
              <div class="light-sub" id="lsub-${light.name}">${sub||'—'}</div>
            </div>
            <button class="toggle" onclick="api('/lights/${light.name}/toggle','PUT').then(refresh)"></button>
          </div>
          <div class="light-slider-row" id="lbr-${light.name}" style="display:${isOn?'block':'none'}">
            <input type="range" min="1" max="254" value="${light.brightness??127}"
              id="lrange-${light.name}"
              oninput="setBri('${light.name}',this.value)"
              onpointerdown="_brTouched['${light.name}']=Date.now()"
              ontouchstart="_brTouched['${light.name}']=Date.now()">
          </div>
        </div>`;
      el.appendChild(wrap);
    } else {
      card.className = `light-card${isOn?' on':''}`;
      document.getElementById(`lsub-${light.name}`).textContent = sub||'—';
      document.getElementById(`lbr-${light.name}`).style.display = isOn ? 'block' : 'none';
      const r = document.getElementById(`lrange-${light.name}`);
      if (r && ((_brTouched[light.name]||0) + 3000 < now) && light.brightness != null)
        r.value = light.brightness;
    }
  }
}

function setBri(name, val) {
  _brTouched[name] = Date.now();
  clearTimeout(_brTimers[name]);
  _brTimers[name] = setTimeout(() => api(`/lights/${name}/brightness/${val}`, 'PUT'), 120);
}

// ── Refresh ───────────────────────────────────────────────
async function refresh() {
  try {
    const lights = await api('/lights');
    document.getElementById('dot').className = 'ok';
    renderLights(lights);
    updateMasterSlider(lights);
  } catch { document.getElementById('dot').className = 'err'; }
}

// ── Init ──────────────────────────────────────────────────
async function init() {
  setGreeting();
  try {
    await Promise.all([loadGroups(), loadProfiles(), loadScenes(), loadColors(), loadEffects()]);
    await refresh();
  } catch { document.getElementById('dot').className = 'err'; }
  setInterval(refresh, 4000);
}

if ('serviceWorker' in navigator) navigator.serviceWorker.register('/static/sw.js');
init();
</script>
</body>
</html>
